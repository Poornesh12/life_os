name: Build and Deploy to EC2 Kubernetes

on:
  push:
    branches:
      - main

env:
  REGISTRY: ghcr.io
  SERVER_IMAGE: ghcr.io/poornesh12/life_os-server:latest
  CLIENT_IMAGE: ghcr.io/poornesh12/life_os-client:latest

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write

    strategy:
      matrix:
        include:
          - name: server
            context: ./server
            target: ''
            image: ghcr.io/poornesh12/life_os-server:latest

          - name: client
            context: ./client
            target: development
            image: ghcr.io/poornesh12/life_os-client:latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push ${{ matrix.name }} image
        uses: docker/build-push-action@v5
        with:
          context: ${{ matrix.context }}
          target: ${{ matrix.target || '' }}
          push: true
          tags: ${{ matrix.image }}

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest

    steps:
      - name: Deploy to EC2
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_SSH_KEY }}

          script: |
            set -e

            export KUBECONFIG=$HOME/.kube/config
            REPO_DIR=$HOME/life-os

            echo "Setting up kubeconfig..."
            mkdir -p ~/.kube
            sudo cp /etc/rancher/k3s/k3s.yaml ~/.kube/config
            sudo chown $(id -u):$(id -g) ~/.kube/config

            echo "Cloning or updating repository..."
            if [ ! -d "$REPO_DIR/.git" ]; then
              git clone https://${{ github.actor }}:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git $REPO_DIR
            fi

            cd $REPO_DIR
            git pull https://${{ github.actor }}:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git main

            echo "Creating namespace..."
            kubectl create namespace lifeos --dry-run=client -o yaml | kubectl apply -f -

            echo "Creating GHCR image pull secret..."
            kubectl create secret docker-registry ghcr-secret \
              --docker-server=ghcr.io \
              --docker-username=${{ github.actor }} \
              --docker-password=${{ secrets.GITHUB_TOKEN }} \
              --docker-email=github-actions@github.com \
              -n lifeos \
              --dry-run=client -o yaml | kubectl apply -f -

            echo "Patching default service account..."
            kubectl patch serviceaccount default \
              -n lifeos \
              -p '{"imagePullSecrets":[{"name":"ghcr-secret"}]}' || true

            echo "Applying Kubernetes manifests..."
            kubectl apply -k infra/k8s/

            echo "Restarting deployments..."
            kubectl rollout restart deployment/server-deployment -n lifeos
            kubectl rollout restart deployment/client-deployment -n lifeos

            echo "Waiting for rollout..."
            kubectl rollout status deployment/server-deployment -n lifeos
            kubectl rollout status deployment/client-deployment -n lifeos

            echo "Deployment completed successfully."