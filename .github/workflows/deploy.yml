name: Build and Deploy to EC2 Kubernetes

on:
  push:
    branches:
      - main

env:
  REGISTRY: ghcr.io
  # GHCR requires lowercase repository names
  SERVER_IMAGE_NAME: poornesh12/life_os-server
  CLIENT_IMAGE_NAME: poornesh12/life_os-client

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Log in to the Container registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Build and push server
      - name: Build and push server image
        uses: docker/build-push-action@v5
        with:
          context: ./server
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.SERVER_IMAGE_NAME }}:latest
          
      # Build and push client
      - name: Build and push client image
        uses: docker/build-push-action@v5
        with:
          context: ./client
          target: development
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.CLIENT_IMAGE_NAME }}:latest

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to EC2 via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            # Pull the latest codebase (assuming it was cloned to ~/life-os)
            if [ ! -d "~/life-os" ]; then
              git clone https://github.com/${{ github.repository }}.git ~/life-os
            fi
            
            cd ~/life-os
            git pull origin main
            
            # Create lifeos namespace if it doesn't exist
            kubectl get namespace lifeos || kubectl create namespace lifeos
            
            # Create a docker registry secret so K3s can pull from GHCR
            kubectl create secret docker-registry ghcr-secret \
              --docker-server=https://ghcr.io \
              --docker-username=${{ github.actor }} \
              --docker-password=${{ secrets.GITHUB_TOKEN }} \
              --docker-email=github-actions@github.com \
              -n lifeos \
              --dry-run=client -o yaml | kubectl apply -f -
            
            # Patch the default service account in lifeos namespace to use the secret
            kubectl patch serviceaccount default -n lifeos -p '{"imagePullSecrets": [{"name": "ghcr-secret"}]}'
            
            # Apply all K8s manifests
            kubectl apply -k infra/k8s/
            
            # Force a restart of the deployments to pick up the new images
            kubectl rollout restart deployment server-deployment -n lifeos
            kubectl rollout restart deployment client-deployment -n lifeos
