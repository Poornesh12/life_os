name: Build and Deploy (CloudFront + S3 + EC2)

on:
  push:
    branches:
      - main

env:
  REGISTRY: ghcr.io
  SERVER_IMAGE: ghcr.io/poornesh12/life_os-server:latest

jobs:
  build-server:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push server image
        uses: docker/build-push-action@v5
        with:
          context: ./server
          push: true
          tags: ${{ env.SERVER_IMAGE }}

  build-and-upload-client:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: client/package-lock.json

      - name: Install dependencies
        run: |
          cd client
          npm ci

      - name: Build application
        run: |
          cd client
          npm run build

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Upload to S3
        run: |
          aws s3 sync client/dist s3://${{ secrets.AWS_S3_BUCKET }} --delete

  deploy:
    needs: [build-server, build-and-upload-client]
    runs-on: ubuntu-latest

    steps:
      - name: Deploy to EC2
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_SSH_KEY }}

          script: |
            set -e

            export KUBECONFIG=$HOME/.kube/config
            REPO_DIR=$HOME/life-os

            # Assumes ~/.kube/config is already set up on the host.

            echo "Cloning or updating repository..."
            if [ ! -d "$REPO_DIR/.git" ]; then
              git clone https://${{ github.actor }}:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git $REPO_DIR
            fi

            cd $REPO_DIR
            git pull https://${{ github.actor }}:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git main

            echo "Creating namespace..."
            kubectl create namespace lifeos --dry-run=client -o yaml | kubectl apply -f -

            echo "Creating GHCR image pull secret..."
            kubectl create secret docker-registry ghcr-secret \
              --docker-server=ghcr.io \
              --docker-username=${{ github.actor }} \
              --docker-password=${{ secrets.GITHUB_TOKEN }} \
              --docker-email=github-actions@github.com \
              -n lifeos \
              --dry-run=client -o yaml | kubectl apply -f -

            echo "Patching default service account..."
            kubectl patch serviceaccount default \
              -n lifeos \
              -p '{"imagePullSecrets":[{"name":"ghcr-secret"}]}' || true

            echo "Applying Kubernetes manifests..."
            kubectl apply -k infra/k8s/

            echo "Restarting deployments..."
            kubectl rollout restart deployment/server-deployment -n lifeos

            echo "Waiting for rollout..."
            kubectl rollout status deployment/server-deployment -n lifeos

            echo "Deployment completed successfully."