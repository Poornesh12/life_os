version: '3.9'

services:
  server:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: lifeos-server
    ports:
      - "8000:8000"
    environment:
      - MONGODB_URI=mongodb://host.docker.internal:27017
      - DB_NAME=lifeos
    env_file:
      - ./server/.env
    restart: unless-stopped
    volumes:
      - ./server:/app
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  client:
    build:
      context: ./client
      dockerfile: Dockerfile
      target: development
    container_name: lifeos-client
    ports:
      - "5173:5173"
    environment:
      - VITE_PROXY_TARGET=http://server:8000
    volumes:
      - ./client:/app
      - /app/node_modules
    depends_on:
      - server
    restart: unless-stopped
