apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: lifeos-ingress
  namespace: lifeos
  annotations:
    kubernetes.io/ingress.class: "traefik"
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
spec:
  rules:
    - host: lifeos.my_dev_app.com # Replace with your actual domain
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: client-service
                port:
                  number: 5173
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: server-service
                port:
                  number: 8000
  tls:
    - hosts:
        - lifeos.my_dev_app.com # Replace with your actual domain
      secretName: lifeos-tls-cert
