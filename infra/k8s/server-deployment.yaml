apiVersion: apps/v1
kind: Deployment
metadata:
  name: server-deployment
  namespace: lifeos
  labels:
    app: server
spec:
  replicas: 1
  selector:
    matchLabels:
      app: server
  template:
    metadata:
      labels:
        app: server
    spec:
      containers:
      - name: server
        image: ghcr.io/poornesh12/life_os-server:latest
        imagePullPolicy: Always
        ports:
        - containerPort: 8000
          hostPort: 8000
        env:
        - name: MONGODB_URI
          valueFrom:
            secretKeyRef:
              name: lifeos-secrets
              key: MONGODB_URI
        envFrom:
        - configMapRef:
            name: lifeos-config
        # Overriding the start command to ensure it binds to 0.0.0.0
        command: ["uvicorn", "app.main:app", "--host", "0.0.0.0", "--port", "8000"]
