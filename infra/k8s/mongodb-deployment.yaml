apiVersion: apps/v1
kind: Deployment
metadata:
  name: mongodb-deployment
  namespace: lifeos
  labels:
    app: mongodb
spec:
  replicas: 1
  selector:
    matchLabels:
      app: mongodb
  template:
    metadata:
      labels:
        app: mongodb
    spec:
      containers:
      - name: mongodb
        image: mongo:latest
        ports:
        - containerPort: 27017
        # Note: In a real production environment, you'd use a PersistentVolumeClaim
        # here instead of just an emptyDir or ephemeral storage so that your data persists
        # across pod restarts.
        volumeMounts:
        - name: mongodb-data
          mountPath: /data/db
      volumes:
      - name: mongodb-data
        emptyDir: {}
